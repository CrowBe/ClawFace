<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ClawFace — Agentic Mobile Client Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Gloria+Hallelujah&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --paper: #F5F1E8;
    --paper-2: #EFE8D6;
    --ink: #161513;
    --ink-2: #2a2824;
    --muted: #7a7568;
    --line: #1b1a17;
    --accent: oklch(0.68 0.17 45); /* warm orange */
    --accent-2: oklch(0.72 0.14 145); /* sage */
    --highlight: oklch(0.92 0.13 95); /* yellow highlight */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--paper);
    color: var(--ink);
    font-family: 'Caveat', 'Gloria Hallelujah', cursive;
    /* subtle paper grain */
    background-image:
      radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,0.025) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .hand { font-family: 'Caveat', cursive; }
  .scrawl { font-family: 'Gloria Hallelujah', cursive; }

  /* wobble all boxes a little */
  .wobble-1 { transform: rotate(-0.4deg); }
  .wobble-2 { transform: rotate(0.3deg); }
  .wobble-3 { transform: rotate(-0.2deg); }

  /* top bar */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px 12px;
    background: var(--paper);
    border-bottom: 1.5px solid var(--ink);
    box-shadow: 0 2px 0 var(--ink);
  }
  .topbar h1 {
    font-family: 'Caveat', cursive;
    font-size: 34px; font-weight: 700; margin: 0;
    letter-spacing: 0.5px;
  }
  .topbar .sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .topbar .spacer { flex: 1; }

  /* tabs — screens */
  .tabs {
    display: flex; gap: 0; overflow-x: auto;
    padding: 10px 24px 0;
    border-bottom: 1.5px solid var(--ink);
    background: var(--paper);
    position: sticky; top: 69px; z-index: 40;
  }
  .tab {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    padding: 8px 18px 10px;
    border: 1.5px solid var(--ink);
    border-bottom: none;
    border-radius: 14px 14px 0 0;
    background: var(--paper-2);
    cursor: pointer;
    margin-right: -1.5px;
    position: relative; top: 1px;
    white-space: nowrap;
    color: var(--ink-2);
  }
  .tab .num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--muted);
    display: block; letter-spacing: 1px;
    margin-bottom: -3px;
  }
  .tab[aria-selected="true"] {
    background: var(--paper);
    color: var(--ink);
    border-bottom: 2px solid var(--paper);
    z-index: 2;
    box-shadow: 0 -2px 0 var(--ink) inset, -1px 0 0 var(--ink), 1px 0 0 var(--ink);
  }
  .tab[aria-selected="true"] .num { color: var(--accent); }

  /* variant tabs */
  .vtabs {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 18px 24px 8px;
  }
  .vtab {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    padding: 4px 14px 6px;
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    background: var(--paper-2);
    cursor: pointer;
  }
  .vtab[aria-selected="true"] {
    background: var(--ink); color: var(--paper);
  }

  /* canvas */
  .canvas {
    padding: 24px 24px 80px;
  }
  .screen-intro {
    max-width: 760px;
    font-family: 'Caveat', cursive;
    font-size: 22px; line-height: 1.35;
    margin: 0 24px 8px;
    color: var(--ink-2);
  }
  .screen-intro .note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; text-transform: uppercase;
    color: var(--muted); letter-spacing: 1.5px;
  }

  /* phone frame */
  .phones-row {
    display: flex; gap: 48px; flex-wrap: wrap;
    padding: 16px 24px 0;
    align-items: flex-start;
  }
  .phone-wrap {
    display: flex; flex-direction: column; align-items: center;
    width: 320px;
  }
  .phone-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .phone-name {
    font-family: 'Caveat', cursive;
    font-size: 26px; font-weight: 700; margin-bottom: 10px;
    color: var(--ink);
  }
  .phone {
    width: 300px; height: 620px;
    background: var(--paper);
    border: 2.5px solid var(--ink);
    border-radius: 42px;
    position: relative;
    padding: 12px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .phone::before {
    content: ""; position: absolute;
    top: 10px; left: 50%; transform: translateX(-50%);
    width: 96px; height: 22px; border-radius: 999px;
    background: var(--ink);
  }
  .phone-inner {
    width: 100%; height: 100%;
    border: 1.5px solid var(--ink);
    border-radius: 30px;
    background: var(--paper);
    padding: 38px 0 20px;
    overflow: hidden;
    position: relative;
  }
  .phone-inner::after { /* home indicator */
    content: ""; position: absolute;
    bottom: 7px; left: 50%; transform: translateX(-50%);
    width: 90px; height: 4px; background: var(--ink);
    border-radius: 2px;
  }

  /* sticky note callout */
  .sticky {
    font-family: 'Caveat', cursive;
    font-size: 17px; line-height: 1.15;
    background: var(--highlight);
    padding: 10px 12px;
    border: 1.5px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
    max-width: 240px;
    color: var(--ink);
  }
  .annotations {
    display: flex; flex-direction: column; gap: 12px;
    margin-top: 14px; max-width: 300px;
  }

  /* common sketch primitives, usable inside phones */
  .sk-row { padding: 0 14px; }
  .sk-title {
    font-family: 'Caveat', cursive; font-weight: 700;
    font-size: 26px; padding: 4px 16px 8px;
  }
  .sk-sub {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.5px; padding: 0 16px 6px;
  }
  .sk-divider {
    height: 1.5px; background: var(--ink);
    margin: 6px 14px;
    opacity: 0.25;
  }
  .sk-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 10px 3px;
    border: 1.5px solid var(--ink); border-radius: 999px;
    font-family: 'Caveat', cursive; font-size: 16px;
    background: var(--paper);
  }
  .sk-chip.active { background: var(--ink); color: var(--paper); }
  .sk-chip.warn { background: var(--accent); color: var(--paper); border-color: var(--ink); }
  .sk-box {
    border: 1.5px solid var(--ink); border-radius: 10px;
    padding: 8px 10px; background: var(--paper);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  }
  .sk-line {
    height: 6px; background: var(--ink); opacity: 0.25;
    border-radius: 3px;
  }
  .sk-line.short { width: 40%; }
  .sk-line.mid { width: 70%; }

  /* bottom bar */
  .sk-tabbar {
    position: absolute; bottom: 18px; left: 14px; right: 14px;
    border: 1.5px solid var(--ink); border-radius: 18px;
    background: var(--paper);
    display: flex; justify-content: space-around;
    padding: 8px 4px 6px;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  }
  .sk-tabbar .tabitem {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
  }
  .sk-tabbar .tabitem.active { color: var(--ink); }
  .sk-tabbar .tabitem .ico {
    width: 22px; height: 22px; border: 1.5px solid var(--ink);
    border-radius: 6px; margin: 0 auto 2px;
    background: var(--paper);
  }
  .sk-tabbar .tabitem.active .ico { background: var(--ink); }

  /* tweaks panel */
  #tweaks {
    position: fixed; right: 20px; bottom: 20px; z-index: 100;
    width: 280px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 12px 14px 14px;
    box-shadow: 4px 4px 0 var(--ink);
    display: none;
  }
  #tweaks.open { display: block; }
  #tweaks h3 {
    font-family: 'Caveat', cursive; font-size: 24px;
    margin: 0 0 8px;
  }
  #tweaks label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    text-transform: uppercase; color: var(--muted); letter-spacing: 1px;
    display: block; margin-top: 10px; margin-bottom: 4px;
  }
  #tweaks .row { display: flex; gap: 6px; flex-wrap: wrap; }
  #tweaks button {
    font-family: 'Caveat', cursive; font-size: 16px;
    padding: 3px 10px 4px; border: 1.5px solid var(--ink);
    border-radius: 999px; background: var(--paper-2); cursor: pointer;
  }
  #tweaks button.active { background: var(--ink); color: var(--paper); }

  /* avatar blob */
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1.5px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat', cursive; font-size: 20px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-2); display: inline-block;
  }
  .dot.warn { background: var(--accent); }
  .dot.off { background: var(--muted); }

  /* legend header */
  .legend {
    display: flex; gap: 20px; padding: 10px 24px 0;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px;
    flex-wrap: wrap;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .swatch {
    width: 12px; height: 12px; border: 1.5px solid var(--ink);
  }
</style>
</head>
<body>

<div id="root"></div>

<div id="tweaks">
  <h3>Tweaks</h3>
  <label>Paper tone</label>
  <div class="row" data-knob="paper">
    <button data-val="warm" class="active">Warm cream</button>
    <button data-val="cool">Cool gray</button>
    <button data-val="white">Pure white</button>
  </div>
  <label>Accent</label>
  <div class="row" data-knob="accent">
    <button data-val="orange" class="active">Orange</button>
    <button data-val="blue">Blue</button>
    <button data-val="red">Red</button>
  </div>
  <label>Hand</label>
  <div class="row" data-knob="hand">
    <button data-val="caveat" class="active">Caveat</button>
    <button data-val="gloria">Gloria</button>
  </div>
</div>

<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "paper": "white",
  "accent": "blue",
  "hand": "gloria"
}/*EDITMODE-END*/;

const state = { ...TWEAK_DEFAULTS };

function applyTweaks() {
  const r = document.documentElement.style;
  // paper
  if (state.paper === 'warm')  { r.setProperty('--paper','#F5F1E8'); r.setProperty('--paper-2','#EFE8D6'); }
  if (state.paper === 'cool')  { r.setProperty('--paper','#EDEEF0'); r.setProperty('--paper-2','#DFE2E5'); }
  if (state.paper === 'white') { r.setProperty('--paper','#FFFFFF'); r.setProperty('--paper-2','#F2F2F2'); }
  // accent
  if (state.accent === 'orange') r.setProperty('--accent','oklch(0.68 0.17 45)');
  if (state.accent === 'blue')   r.setProperty('--accent','oklch(0.6 0.15 250)');
  if (state.accent === 'red')    r.setProperty('--accent','oklch(0.6 0.2 25)');
  // hand
  document.body.style.fontFamily = state.hand === 'gloria'
    ? "'Gloria Hallelujah', cursive"
    : "'Caveat', cursive";
}
applyTweaks();

// Edit mode protocol
window.addEventListener('message', (e) => {
  if (!e.data) return;
  if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('open');
  if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');
});
window.parent.postMessage({type:'__edit_mode_available'}, '*');

document.querySelectorAll('#tweaks .row').forEach(row => {
  const knob = row.dataset.knob;
  row.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      row.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state[knob] = btn.dataset.val;
      applyTweaks();
      window.parent.postMessage({type:'__edit_mode_set_keys', edits: { [knob]: btn.dataset.val }}, '*');
    });
  });
});
</script>

<script type="text/babel" src="wf-screens.jsx"></script>
<script type="text/babel" src="wf-app.jsx"></script>
</body>
</html>
